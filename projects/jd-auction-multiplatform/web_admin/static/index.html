      --primary: #0f766e;

      color: var(--text);

      letter-spacing: 0;

    a { color: var(--primary); text-decoration: none; }

    .shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand { font-size: 18px; font-weight: 700; white-space: nowrap; }
    .top-actions { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; }
    .top-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--surface-soft);

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; display: inline-block; }
    .status-dot.ok { background: var(--success); }
    .status-dot.bad { background: var(--danger); }

    .layout { display: flex; min-height: calc(100vh - 56px); }
    .sidebar {
      width: 184px;
      background: var(--surface);
      border-right: 1px solid var(--line);
      padding: 12px 8px;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);

    .nav-item {
      display: block;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .nav-item:hover { background: var(--surface-soft); }
    .nav-item.router-link-active {
      color: var(--primary);
      background: var(--primary-soft);
      border-left: 3px solid var(--primary);
      padding-left: 9px;
    }

    .content {
      flex: 1;
      min-width: 0;
      padding: 18px;
    }
    .page-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }
    .page-title h1 { margin: 0; font-size: 20px; line-height: 1.35; }
    .page-title p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .metric, .panel {

      .login-visual { padding: 28px; }

const STATUS_TYPE = {
  success: "success",
  partial_success: "warning",
  failed: "danger",
  running: "primary",
  parsing: "warning",
  paused: "info",
  pending: "info",
  pending_ai: "warning",
  updated: "success",
  unchanged: "info",
  skipped: "info",
  completed: "success",
  timeout: "danger",
  enabled: "success",
  disabled: "info"
};

function textOf(value, fallback = "-") {
  if (value === null || value === undefined || value === "") return fallback;
  if (typeof value === "object") return JSON.stringify(value);
  return String(value);
}

function numberOf(value) {
  const num = Number(value || 0);
  return Number.isFinite(num) ? num : 0;
}

function formatTime(value) {
  if (!value) return "-";
  return String(value).replace("T", " ").replace(/\.\d+$/, "");
}

function safeSourceUrl(value) {
  const text = String(value || "").trim();
  return /^https?:\/\//i.test(text) ? text : "";
}

function shortUrl(value) {
  const text = String(value || "");
  return text.length > 60 ? text.slice(0, 60) + "..." : text;
}

function platformName(value) {
  return PLATFORM_LABELS[value] || value || "-";
}

function fieldLabel(key) {
  return FIELD_LABELS[key] || key || "-";
}

function fieldRows(obj, options = {}) {
  const hidden = new Set(options.hidden || ["item_id"]);
  return Object.entries(obj || {})
    .filter(([key]) => !hidden.has(key))
    .map(([key, value]) => ({ key, label: fieldLabel(key), value }));
}

function detailColumns(rows) {
  const first = (rows || [])[0] || {};
  return Object.keys(first).map(key => ({ key, label: fieldLabel(key) }));
}

async function apiRequest(url, options = {}) {
  const opts = { ...options };
  opts.headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  const res = await fetch(url, opts);
  const contentType = res.headers.get("content-type") || "";
  let data;
  if (contentType.includes("application/json")) {
    data = await res.json();
  } else {
    data = await res.text();
  }
  if (url.startsWith("/api/") && !contentType.includes("application/json")) {
    throw new Error(`接口返回了非 JSON 内容，可能命中了前端页面或后端路由未注册：${url}`);
  }
  if (!res.ok) {
    const detail = typeof data === "object" ? (data.detail || data.message || JSON.stringify(data)) : data;
    throw new Error(detail || `请求失败：${res.status}`);
  }
  return data;
}

function usePageLoader() {
  const loading = ref(false);
  const error = ref("");
  async function load(fn) {
    loading.value = true;
    error.value = "";
    try {
      return await fn();
    } catch (err) {
      error.value = err.message || String(err);
      ElMessage.error(error.value);
      throw err;
    } finally {
      loading.value = false;
    }
  }
  return { loading, error, load };
}

const ErrorBox = {
  props: ["message"],
  template: `<div v-if="message" class="error-box">{{ message }}</div>`
};

const StatusTag = {
  props: ["value"],
  template: `
    <el-tag size="small" :type="tagType">
      {{ value || "-" }}
    </el-tag>
  `,
  computed: {
    tagType() {
      return STATUS_TYPE[this.value] || "";
    }
  }
};

const DashboardPage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const { loading, error, load } = usePageLoader();
    const stats = ref({});
    const scheduler = ref({});
    const tasks = ref([]);
    const platforms = ref([]);
    const reports = ref([]);
    const activity = ref([]);
    const trend = ref([]);
    const platformDist = ref([]);
    const assetDist = ref([]);
    const platformChartEl = ref(null);
    const assetChartEl = ref(null);
    const trendChartEl = ref(null);
    let platformChart = null;
    let assetChart = null;
    let trendChart = null;
    let refreshTimer = null;

    const aiQueue = computed(() => stats.value.ai_queue || {});
    const runningTasks = computed(() => tasks.value.filter(t => ["running", "pending"].includes(t.status)));

    async function refresh() {
      await load(async () => {
        const [s, sch, taskRes, platformRes, reportRes, recent, trendRes, platformDistRes, assetDistRes] = await Promise.allSettled([
          apiRequest("/api/dashboard/stats"),
          apiRequest("/api/scheduler/status"),
          apiRequest("/api/tasks"),
          apiRequest("/api/platforms"),
          apiRequest("/api/reports?size=5"),
          apiRequest("/api/dashboard/recent-activity?limit=8"),
          apiRequest("/api/dashboard/trend?days=7"),
          apiRequest("/api/dashboard/platform-distribution"),
          apiRequest("/api/dashboard/asset-distribution")
        ]);
        if (s.status === "fulfilled") stats.value = s.value || {};
        if (sch.status === "fulfilled") scheduler.value = sch.value || {};
        if (taskRes.status === "fulfilled") tasks.value = taskRes.value.items || [];
        if (platformRes.status === "fulfilled") platforms.value = platformRes.value || [];
        if (reportRes.status === "fulfilled") reports.value = reportRes.value.items || [];
        if (recent.status === "fulfilled") activity.value = recent.value || [];
        if (trendRes.status === "fulfilled") trend.value = trendRes.value || [];
        if (platformDistRes.status === "fulfilled") platformDist.value = platformDistRes.value || [];
        if (assetDistRes.status === "fulfilled") assetDist.value = assetDistRes.value || [];
        await nextTick();
        renderCharts();
      });
    }

    function renderCharts() {
      if (!window.echarts) return;
      if (platformChartEl.value) {

const JobsPage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const { loading, error, load } = usePageLoader();
    const jobs = ref([]);
    const total = ref(0);
    const tasks = ref([]);
    const filters = reactive({ platform: "", status: "", page: 1, size: 20 });
    const dialogVisible = ref(false);
    const editing = ref(null);
    const cronPreview = ref(null);
    const form = reactive({
      job_name: "",
      source_platform: "jd",
      cron_expr: "0 2 * * *",
      crawl_mode: "incremental",
      category_scope: "",
      page_limit: 5,
      per_category_limit: 10,
      throttle_seconds: 0.35,
      ai_enabled: true,
      attachment_parse_enabled: false,
      enabled: true
    });
    let timer = null;

    async function refresh() {
      await load(async () => {
        const params = new URLSearchParams({
          page: filters.page,
          size: filters.size,
          platform: filters.platform,
          status: filters.status
        });
        const [jobRes, taskRes] = await Promise.all([
          apiRequest(`/api/jobs?${params}`),
          apiRequest("/api/tasks")
        ]);
        jobs.value = jobRes.items || [];
        total.value = jobRes.total || 0;
        tasks.value = taskRes.items || [];
      });
    }
    function onJobFilterChange() { filters.page = 1; refresh(); }
    function onJobPageChange(pn) { filters.page = pn; refresh(); }

    function resetForm(row) {
      editing.value = row || null;
      Object.assign(form, {
        job_name: row?.job_name || "",
        source_platform: row?.source_platform || "jd",
        cron_expr: row?.cron_expr || "0 2 * * *",
        crawl_mode: row?.crawl_mode || "incremental",
        category_scope: row?.category_scope || "",
        page_limit: row?.page_limit ?? 5,
        per_category_limit: row?.per_category_limit ?? 10,
        throttle_seconds: row?.throttle_seconds ?? 0.35,
        item_concurrency: row?.item_concurrency ?? 3,
        ai_enabled: row?.ai_enabled === undefined ? true : !!row.ai_enabled,
        attachment_parse_enabled: !!row?.attachment_parse_enabled,
        enabled: row?.enabled === undefined ? true : !!row.enabled
      });
      cronPreview.value = null;
      dialogVisible.value = true;
    }

    async function previewCron() {
      if (!form.cron_expr.trim()) {
        cronPreview.value = { valid: true, next_run: null };
        return;
      }
      try {
        cronPreview.value = await apiRequest(`/api/scheduler/preview?expr=${encodeURIComponent(form.cron_expr)}`);
      } catch (err) {
        cronPreview.value = { valid: false, error: err.message };
      }
    }

    async function saveJob() {
      if (!form.job_name.trim()) return ElMessage.error("请填写任务名称");
      await previewCron();
      if (cronPreview.value && cronPreview.value.valid === false) {
        return ElMessage.error(cronPreview.value.error || "Cron 表达式无效");
      }
      const payload = { ...form };
      const url = editing.value ? `/api/jobs/${editing.value.job_id}` : "/api/jobs";
      const method = editing.value ? "PUT" : "POST";
      try {
        const res = await apiRequest(url, { method, body: JSON.stringify(payload) });
        ElMessage.success(res.message || "保存成功");
        dialogVisible.value = false;
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "保存失败");
      }
    }

    async function runNow(row) {
      try {
        const res = await apiRequest(`/api/jobs/${row.job_id}/run-now`, { method: "POST" });
        ElMessage.success(`任务已触发：${res.task_id}`);
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "触发失败");
      }
    }

    async function toggleJob(row) {
      try {
        await apiRequest(`/api/jobs/${row.job_id}/toggle`, { method: "POST" });
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "切换失败");
      }
    }

    async function deleteJob(row) {
      try {
        await ElMessageBox.confirm(`确认删除任务“${row.job_name}”？`, "删除任务", { type: "warning" });
        await apiRequest(`/api/jobs/${row.job_id}`, { method: "DELETE" });
        ElMessage.success("已删除");
        await refresh();
      } catch (err) {
        if (err !== "cancel") ElMessage.error(err.message || "删除失败");
      }
    }

    onMounted(() => {
      refresh();
      timer = setInterval(refresh, 5000);
    });
    onUnmounted(() => timer && clearInterval(timer));

    return { loading, error, jobs, total, tasks, filters, form, dialogVisible, editing, cronPreview, PLATFORM_LABELS, refresh, resetForm, previewCron, saveJob, runNow, toggleJob, deleteJob, platformName, formatTime, textOf, onJobFilterChange, onJobPageChange };

};

const ItemsPage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const { loading, error, load } = usePageLoader();
    const rows = ref([]);
    const total = ref(0);
    const optionFilters = ref({ platforms: [], asset_groups: [], statuses: [] });
    const filters = reactive({ page: 1, size: 20, platform: "", asset_group: "", status: "", keyword: "", price_min: 0, price_max: 0, missing: "" });

    async function refresh() {
      await load(async () => {
        const params = new URLSearchParams({
          page: filters.page,
          size: filters.size,
          platform: filters.platform,
          asset_group: filters.asset_group,
          status: filters.status,
          keyword: filters.keyword,
          price_min: filters.price_min || 0,
          price_max: filters.price_max || 0
        });
        const res = await apiRequest(`/api/items?${params}`);
        let items = res.items || [];
        if (filters.missing === "final_price") items = items.filter(i => !i.final_price_display && !i.final_price_amount);
        if (filters.missing === "location") items = items.filter(i => !i.asset_location);
        rows.value = items;
        total.value = filters.missing ? items.length : (res.total || 0);
        optionFilters.value = res.filters || optionFilters.value;
      });
    }

    function onFilterChange() {
      filters.page = 1;
      refresh();

      refresh();

    function openDetail(row) {
      router.push(`/items/${row.item_id}`);

    onMounted(refresh);
    return { loading, error, rows, total, filters, optionFilters, refresh, openDetail, platformName, formatTime, textOf, onFilterChange, onPageChange };

        <el-select v-model="filters.status" placeholder="项目状态" clearable @change="onFilterChange"><el-option v-for="s in optionFilters.statuses" :key="s" :label="s" :value="s" /></el-select>
        <el-select v-model="filters.missing" placeholder="字段缺失" clearable @change="onFilterChange"><el-option label="最终价缺失" value="final_price" /><el-option label="所在地缺失" value="location" /></el-select>
        <el-input class="wide" v-model="filters.keyword" clearable placeholder="项目名称或所在地" @keyup.enter="onFilterChange" />

          <el-table-column prop="project_name" label="项目名称" min-width="280" show-overflow-tooltip />
          <el-table-column label="来源" width="120"><template #default="{row}">{{ platformName(row.source_platform) }}</template></el-table-column>
          <el-table-column label="类型" width="130"><template #default="{row}">{{ row.asset_group_label || row.asset_group }}</template></el-table-column>
          <el-table-column label="状态" width="110"><template #default="{row}"><StatusTag :value="row.project_status" /></template></el-table-column>
          <el-table-column prop="start_price_display" label="起拍价" width="130" />

          <el-table-column prop="asset_location" label="所在地" min-width="180" show-overflow-tooltip />
          <el-table-column label="操作" width="100" fixed="right"><template #default="{row}"><el-button size="small" @click="openDetail(row)">详情</el-button></template></el-table-column>

const ItemDetailPage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const route = VueRouter.useRoute();
    const { loading, error, load } = usePageLoader();
    const data = ref(null);
    const active = ref("common");
    const previewItem = ref(null);       // 当前预览的资源对象
    const previewVisible = ref(false);

    async function refresh() {
      await load(async () => {
        data.value = await apiRequest(`/api/items/${route.params.id}`);
      });
    }

    // 预览直链（图片/PDF/视频浏览器原生支持跨域加载）
    function proxyUrl(res) {
      if (!res || !res.resource_url) return "";
      return res.resource_url;
    }

    // 下载走代理（添加 Content-Disposition: attachment header）
    function downloadUrl(res) {
      if (!res) return "";
      if (!res.resource_id && res.resource_url) return res.resource_url;
      if (!res.resource_id) return "";
      return `/api/items/resource/${res.resource_id}/proxy?download=1`;
    }

    // 根据扩展名判断文件图标/类别
    function getExt(name) {
      if (!name) return "";
      const clean = String(name).split(/[?#]/)[0];
      const i = clean.lastIndexOf(".");
      return i >= 0 ? clean.slice(i).toLowerCase() : "";
    }

    function isImage(ext) {
      return [".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp", ".svg"].includes(ext);
    }
    function isPdf(ext) {
      return ext === ".pdf";
    }
    function isVideo(ext) {
      return [".mp4", ".webm", ".mov"].includes(ext);
    }
    function isOffice(ext) {
      return [".xls", ".xlsx", ".doc", ".docx", ".ppt", ".pptx"].includes(ext);
    }

    // 分组资源
    const groupedResources = computed(() => {
      const all = (data.value?.resources || []).map(r => {
        const ext = r.resource_format && r.resource_format.startsWith(".")
          ? r.resource_format.toLowerCase()
          : getExt(r.resource_name || r.resource_url || "");
        return { ...r, _ext: ext };
      });
      return {
        images: all.filter(r => r.resource_type === "image" || isImage(r._ext)),
        videos: all.filter(r => r.resource_type === "video" || isVideo(r._ext)),
        attachments: all.filter(r =>
          r.resource_type === "attachment" || (!isImage(r._ext) && !isVideo(r._ext))
        ),
        total: all.length
      };
    });

    function iconFor(r) {
      const ext = r._ext;
      if (isImage(ext)) return "PictureFilled";
      if (isVideo(ext)) return "VideoCameraFilled";
      if (isPdf(ext)) return "Document";
      if (isOffice(ext)) return "Document";
      return "Folder";
    }

    function iconColor(r) {
      const ext = r._ext;
      if (isImage(ext)) return "#409eff";
      if (isVideo(ext)) return "#e6a23c";
      if (isPdf(ext)) return "#f56c6c";
      if (isOffice(ext)) return "#67c23a";
      return "#909399";
    }

    function typeLabel(t) {
      const m = { image: "图片", video: "视频", attachment: "附件" };
      return m[t] || t;
    }

    function roleLabel(r) {
      const m = {
        site_image: "现场照片", vehicle_image: "车辆照片",
        subject_image: "标的图片", announcement_file: "公告文件",
        assessment_report: "评估报告", asset_list: "资产清单"
      };
      return m[r] || r || "";
    }

    function openPreview(res) {
      previewItem.value = res;
      previewVisible.value = true;
    }

    function closePreview() {
      previewVisible.value = false;
      previewItem.value = null;
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (!bytes) return "";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function parseJsonMaybe(value) {
      if (Array.isArray(value) || (value && typeof value === "object")) return value;
      if (typeof value !== "string") return value;
      const text = value.trim();
      if (!text || !/^[\[{]/.test(text)) return value;
      try { return JSON.parse(text); } catch (_e) { return value; }
    }

    function formatMoney(value) {
      if (value === null || value === undefined || value === "") return "-";
      const num = Number(value);
      if (Number.isFinite(num)) return num.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " 元";
      return String(value);
    }

    function formatBidTime(value) {
      if (!value) return "-";
      let raw = value;
      if (typeof raw === "string" && /^\d+$/.test(raw.trim())) raw = Number(raw.trim());
      if (typeof raw === "number" && Number.isFinite(raw)) {
        const ms = raw > 100000000000 ? raw : raw * 1000;
        const dt = new Date(ms);
        if (!Number.isNaN(dt.getTime())) {
          const pad = (n) => String(n).padStart(2, "0");
          return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
        }
      }
      return formatTime(raw);
    }

    function bidFlagText(row) {
      const parts = [];
      if (row.isPrior === 1 || row.isPrior === true || row.isPrior === "1") parts.push("领先");
      if (row.whetherMyBid === 1 || row.whetherMyBid === true || row.whetherMyBid === "1") parts.push("我的出价");
      return parts.join(" / ") || "-";
    }

    const commonRows = computed(() => {
      const item = data.value?.item || {};
      return [
        ["来源平台", platformName(item.source_platform)],
        ["平台标的ID", item.source_item_id],
        ["项目名称", item.project_name],
        ["标的类型", item.asset_type],
        ["资产类型", item.asset_group_label || item.asset_group],
        ["项目状态", item.project_status],
        ["拍卖阶段", item.auction_stage],
        ["标的所在地", item.asset_location],
        ["数据来源", item.data_source],
        ["报名开始时间", formatTime(item.signup_start_time)],
        ["报名截止时间", formatTime(item.signup_end_time)],
        ["处置方", item.disposal_party],
        ["处置机构", item.disposal_agency],
        ["起拍价", item.start_price_display],
        ["最终价", item.final_price_display],
        ["联系方式", item.contact_info],
        ["特别告知", item.special_notice],
        ["评估价格及时间", item.assessment_price_display],
        ["出价记录", bidRecords.value.length ? `共 ${bidRecords.value.length} 条，见下方表格` : "无"],
        ["来源页面", item.source_url || ""],
        ["批次", item.batch_id],
        ["最后采集", formatTime(item.last_crawled_at)]
      ];
    });

    const bidRecords = computed(() => {
      const raw = parseJsonMaybe(data.value?.item?.bid_records_json);
      let rows = [];
      if (Array.isArray(raw)) rows = raw;
      else if (raw && typeof raw === "object") {
        for (const key of ["bidList", "bids", "data", "records", "list"]) {
          if (Array.isArray(raw[key])) {
            rows = raw[key];
            break;
          }
        }
      }
      return rows
        .filter(row => row && typeof row === "object")
        .map((row, idx) => ({
          index: idx + 1,
          price: row.price ?? row.bidPrice ?? row.currentPrice ?? row.amount,
          bidTime: row.bidTime ?? row.time ?? row.createTime ?? row.createdAt,
          username: row.username ?? row.userName ?? row.bidderName ?? row.bidder ?? row.userId,
          flag: bidFlagText(row),
        }));
    });

    function extractImageUrls(value) {
      const found = [];
      const seen = new Set();
      const normalizeFieldImageUrl = (url) => {
        const text = String(url || "").trim();
        if (!text) return "";
        if (text.startsWith("//")) return "https:" + text;
        if (text.startsWith("jfs/")) return "https://img30.360buyimg.com/popWaterMark/" + text;
        return text;
      };
      const add = (url) => {
        const text = normalizeFieldImageUrl(url);
        if (!text || seen.has(text)) return;
        const ext = getExt(text);
        if (/^https?:\/\//i.test(text) && isImage(ext)) {
          seen.add(text);
          found.push(text);
        }
      };
      const walk = (node) => {
        const parsed = parseJsonMaybe(node);
        if (typeof parsed === "string") {
          const matches = parsed.match(/https?:\/\/[^\s"'<>，。；;]+/g) || [];
          matches.forEach(add);
          const jdMatches = parsed.match(/jfs\/[^\s"'<>，。；;]+/g) || [];
          jdMatches.forEach(add);
          return;
        }
        if (Array.isArray(parsed)) {
          parsed.forEach(walk);
          return;
        }
        if (parsed && typeof parsed === "object") {
          Object.values(parsed).forEach(walk);
        }
      };
      walk(value);
      return found;
    }

    function specialImageUrls(row) {
      return extractImageUrls(row?.value);
    }

    function openFieldImagePreview(url, row, index) {
      const ext = getExt(url);
      previewItem.value = {
        resource_type: "image",
        resource_name: `${row?.label || "现场图片"} ${index + 1}`,
        resource_url: url,
        source_section: row?.label || "特有字段",
        _ext: ext,
      };
      previewVisible.value = true;
    }
    // 特有字段：以 asset_* 表列为基准，并合并 field_extractions 的 special 命名空间字段
    // （对齐查看器 jd_viewer，补回因 v2 资产表列少于 SPECIAL_FIELDS 而缺失的特有字段）
    const specialRows = computed(() => {
      const table = fieldRows(data.value?.special || {});
      const tableKeys = new Set(table.map(r => r.key));
      const redundant = new Set();
      if (tableKeys.has("building_area_sqm") || tableKeys.has("building_area_display")) {
        redundant.add("building_area");
      }
      if (tableKeys.has("land_area_sqm") || tableKeys.has("land_area_display")) {
        redundant.add("land_area");
      }
      if (tableKeys.has("building_area_display")) {
        redundant.add("building_area_sqm");
      }
      if (tableKeys.has("land_area_display")) {
        redundant.add("land_area_sqm");
      }
      const base = table.filter(r => !redundant.has(r.key));

      // 来自 field_extractions 的特有字段（查看器的数据源），仅补充表列中不存在的
      const extras = (data.value?.extractions || [])
        .filter(e => String(e.field_namespace || "").startsWith("special") && e.status !== "rejected")
        .map(e => ({
          key: e.field_key,
          label: e.field_label || fieldLabel(e.field_key),
          value: e.display_value != null && e.display_value !== "" ? e.display_value : e.normalized_text
        }))
        .filter(e => e.value != null && e.value !== "" && !tableKeys.has(e.key));
      return base.concat(extras);
    });
    onMounted(refresh);
    return {
      loading, error, data, active, commonRows, specialRows, router, refresh, textOf,
      platformName, formatTime, fieldRows, fieldLabel, detailColumns,
      groupedResources, iconFor, iconColor, typeLabel, roleLabel,
      proxyUrl, downloadUrl, openPreview, closePreview,
      previewItem, previewVisible, formatSize, isImage, isPdf, isVideo, isOffice,
      bidRecords, formatBidTime, formatMoney, specialImageUrls, openFieldImagePreview,
      safeSourceUrl, shortUrl
    };
  },
  template: `
    <section>
      <div class="page-title">
        <div>
          <h1>{{ data?.item?.project_name || "标的详情" }}</h1>
          <p v-if="data?.item">标的 ID：{{ data.item.item_id }}，来源：{{ platformName(data.item.source_platform) }}</p>
        </div>
        <div class="toolbar">
          <el-button @click="router.back()">返回</el-button>
          <el-button @click="refresh" :loading="loading">刷新</el-button>
        </div>
      </div>
      <ErrorBox :message="error" />
      <div v-if="!data && !loading" class="panel"><div class="empty">未找到标的</div></div>
      <template v-if="data">
        <el-tabs v-model="active" type="border-card">
          <el-tab-pane label="共有字段" name="common">
            <el-table :data="commonRows" border size="small">
              <el-table-column prop="0" label="字段" width="180" />
              <el-table-column label="值">
                <template #default="{row}">
                  <span class="pre" style="display:block" v-if="row[0] !== '来源页面'">{{ textOf(row[1], "空") }}</span>
                  <span v-else class="pre" style="display:block">
                    <a v-if="safeSourceUrl(row[1])" :href="safeSourceUrl(row[1])" target="_blank" rel="noopener noreferrer" class="link">{{ shortUrl(row[1]) }}</a>
                    <span v-else>{{ textOf(row[1], "无") }}</span>
                  </span>
                </template>
              </el-table-column>
            </el-table>
            <div v-if="bidRecords.length" style="margin-top:14px">
              <h4 style="margin:0 0 10px 0;font-size:14px;color:var(--primary)">出价记录</h4>
              <el-table :data="bidRecords" border size="small">
                <el-table-column prop="index" label="#" width="60" />
                <el-table-column label="出价金额" width="160"><template #default="{row}">{{ formatMoney(row.price) }}</template></el-table-column>
                <el-table-column label="出价时间" width="180"><template #default="{row}">{{ formatBidTime(row.bidTime) }}</template></el-table-column>
                <el-table-column label="出价人" min-width="160"><template #default="{row}">{{ textOf(row.username, "-") }}</template></el-table-column>
                <el-table-column label="状态" width="130"><template #default="{row}">{{ row.flag }}</template></el-table-column>
              </el-table>
            </div>
          </el-tab-pane>
          <el-tab-pane label="特有字段" name="special">
            <el-table :data="specialRows" border size="small" empty-text="暂无特有字段">
              <el-table-column prop="label" label="字段" width="220" />
              <el-table-column label="值">
                <template #default="{row}">
                  <div v-if="specialImageUrls(row).length" style="display:flex;gap:8px;flex-wrap:wrap">
                    <img
                      v-for="(url, idx) in specialImageUrls(row)"
                      :key="url"
                      class="field-preview-image"
                      :src="url"
                      :alt="row.label"
                      style="width:96px;height:72px;object-fit:cover;border:1px solid var(--line);border-radius:4px;cursor:pointer;background:#f5f5f5"
                      @click="openFieldImagePreview(url, row, idx)"
                      loading="lazy"
                    />
                  </div>
                  <span v-else class="pre" style="display:block">{{ textOf(row.value, "空") }}</span>
                </template>
              </el-table-column>
            </el-table>
          </el-tab-pane>

          <!-- 资源附件 ── 可预览的卡片+列表布局 -->
          <el-tab-pane label="资源附件" name="resources">
            <div v-if="groupedResources.total === 0" style="text-align:center;padding:40px;color:var(--muted)">暂无资源</div>

            <div v-else>
              <!-- 图片区域 -->
              <div v-if="groupedResources.images.length" style="margin-bottom:24px">
                <h4 style="margin:0 0 12px 0;font-size:14px;color:var(--primary)">🖼 图片 ({{ groupedResources.images.length }})</h4>
                <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:10px">
                  <div v-for="img in groupedResources.images" :key="img.resource_id"
                       style="border:1px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer;
                              background:#fafafa;transition:box-shadow .2s"
                       @mouseenter="$event.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,.12)'"
                       @mouseleave="$event.currentTarget.style.boxShadow='none'"
                       @click="openPreview(img)">
                    <div style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
                                background:#e8e8e8;overflow:hidden">
                      <img :src="proxyUrl(img)" :alt="img.resource_name"
                           style="width:100%;height:100%;object-fit:cover"
                           @error="$event.target.style.display='none';$event.target.nextElementSibling.style.display='flex'"
                           loading="lazy" />
                      <el-icon :size="36" :color="iconColor(img)"
                               style="display:none"><component :is="iconFor(img)" /></el-icon>
                    </div>
                    <div style="padding:6px 8px;font-size:12px;color:var(--muted);text-overflow:ellipsis;overflow:hidden;white-space:nowrap"
                         :title="img.resource_name || img.resource_url">
                      {{ img.resource_name || "未命名图片" }}
                    </div>
                    <div v-if="img.resource_role" style="padding:0 8px 6px;font-size:11px;color:var(--accent)">
                      {{ roleLabel(img.resource_role) }}
                    </div>
                  </div>
                </div>
              </div>

const QueuesPage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const { loading, error, load } = usePageLoader();
    const stats = ref({});
    const tasks = ref([]);
    const total = ref(0);
    const selectedIds = ref([]);
    const filters = reactive({ page: 1, size: 20, status: "", platform: "", time_from: "", time_to: "" });
    const concurrency = ref(3);
    const autoConfig = reactive({ enabled: false, concurrency: 3, interval: 20, limit: 50 });
    const profiles = ref([]);
    const selectedProfile = ref("");
    async function loadProfiles() {
      try {
        const rows = await apiRequest("/api/models/profiles");
        profiles.value = rows || [];
      } catch (e) {
        profiles.value = [];
      }
    }
    async function refresh() {
      await load(async () => {
        const params = new URLSearchParams(filters);
        const [s, t] = await Promise.all([apiRequest("/api/queues/ai"), apiRequest(`/api/queues/ai/tasks?${params}`)]);
        stats.value = s || {};
        tasks.value = t.items || [];
        total.value = t.total || 0;
      });
    }
    async function loadAuto() {
      try {
        const cfg = await apiRequest("/api/queues/ai/auto");
        if (cfg) {
          Object.assign(autoConfig, cfg);
          if (cfg.ai_profile !== undefined) selectedProfile.value = cfg.ai_profile || "";
        }
      } catch (e) { /* 忽略 */ }
    }
    async function saveAuto() {
      try {
        const cfg = await apiRequest("/api/queues/ai/auto", {
          method: "POST",
          body: JSON.stringify({
            enabled: autoConfig.enabled,
            concurrency: autoConfig.concurrency,
            interval: autoConfig.interval,
            limit: autoConfig.limit,
            ai_profile: selectedProfile.value || "",
          }),
        });
        if (cfg) Object.assign(autoConfig, cfg);
        ElMessage.success(autoConfig.enabled ? "已开启自动处理" : "已关闭自动处理");
      } catch (err) {
        ElMessage.error(err.message || "保存失败");
      }
    }
    function onQueueFilterChange() {
      filters.page = 1;
      refresh();
    }
    function onQueuePageChange(pn) {
      filters.page = pn;
      refresh();
    }
    async function processQueue() {
      try {
        const params = new URLSearchParams({
          limit: "20",
          concurrency: String(concurrency.value),
        });
        if (selectedProfile.value) params.set("ai_profile", selectedProfile.value);
        const res = await apiRequest(`/api/queues/ai/process?${params}`, { method: "POST" });
        const workerCount = Array.isArray(res.task_ids) ? res.task_ids.length : 1;
        ElMessage.success(res.message || `已触发处理（${workerCount} 个 worker）`);
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "操作失败");
      }
    }
    async function processSelected() {
      if (!selectedIds.value.length) { ElMessage.warning("请先选择要处理的任务"); return; }
      try {
        const res = await apiRequest("/api/queues/ai/process-selected", {
          method: "POST",
          body: JSON.stringify({
            task_ids: selectedIds.value,
            ai_profile: selectedProfile.value || "",
            concurrency: concurrency.value,
          }),
        });
        ElMessage.success(`已优先处理 ${res.updated || selectedIds.value.length} 条选中任务`);
        selectedIds.value = [];
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "操作失败");
      }
    }
    async function action(url, message) {
      try {
        const res = await apiRequest(url, { method: "POST" });
        ElMessage.success(res.message || message);
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "操作失败");
      }
    }
    async function retrySelected() {
      if (!selectedIds.value.length) { ElMessage.warning("请先选择要重试的任务"); return; }
      for (const id of selectedIds.value) {
        await apiRequest(`/api/queues/ai/retry?item_id=${id}`, { method: "POST" });
      }
      ElMessage.success(`已重置 ${selectedIds.value.length} 条选中任务`);
      selectedIds.value = [];
      await refresh();
    }
    async function retryFiltered() {
      const params = new URLSearchParams({ status: filters.status || "failed" });
      if (filters.platform) params.set("platform", filters.platform);
      if (filters.time_from) params.set("time_from", filters.time_from);
      if (filters.time_to) params.set("time_to", filters.time_to);
      const res = await apiRequest(`/api/queues/ai/retry?${params}`, { method: "POST" });
      ElMessage.success(`已重置 ${res.updated} 条任务`);
      await refresh();
    }
    function filteredQueueParams(includeStatus = true) {
      const params = new URLSearchParams();
      if (includeStatus && filters.status) params.set("status", filters.status);
      if (filters.platform) params.set("platform", filters.platform);
      if (filters.time_from) params.set("time_from", filters.time_from);
      if (filters.time_to) params.set("time_to", filters.time_to);
      return params;
    }
    async function pausePendingRunning() {
      try {
        const includeStatus = filters.status === "pending" || filters.status === "running";
        const params = filteredQueueParams(includeStatus);
        const res = await apiRequest(`/api/queues/ai/pause?${params}`, { method: "POST" });
        ElMessage.success(`已暂停 ${res.updated || 0} 条未解析任务`);
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "暂停失败");
      }
    }
    async function resumePaused() {
      try {
        const params = filteredQueueParams(false);
        const res = await apiRequest(`/api/queues/ai/resume?${params}`, { method: "POST" });
        ElMessage.success(`已恢复 ${res.updated || 0} 条暂停任务`);
        await refresh();
      } catch (err) {
        ElMessage.error(err.message || "恢复失败");
      }
    }
    function selectionChange(sel) { selectedIds.value = sel.map((r) => r.ai_task_id || r.queue_id); }
    function modelText(row) {
      const profile = row.running_profile_name || "";
      const detail = [row.running_provider, row.running_model_name].filter(Boolean).join(" / ");
      if (profile && detail) return `${profile}\n${detail}`;
      return profile || detail || "-";
    }
    function aiErrorMsg(msg) {
      if (!msg) return "-";
      const s = String(msg);
      if (s.includes("401") || s.includes("Unauthorized") || s.includes("api_key")) return { icon: "🔑", text: "API Key 无效或未授权" };
      if (s.includes("429") || s.includes("rate") || s.includes("quota") || s.includes("limit")) return { icon: "💰", text: "API 额度耗尽或请求频率限制" };
      if (s.includes("timeout") || s.includes("Timeout") || s.includes("timed out")) return { icon: "⏱️", text: "AI 调用超时" };
      if (s.includes("JSON") || s.includes("parse") || s.includes("format")) return { icon: "🔧", text: "AI 返回格式异常" };
      if (s.includes("Connection") || s.includes("connection")) return { icon: "🔌", text: "网络连接失败" };
      return { icon: "⚠️", text: s.slice(0, 80) };
    }
    const checkpoints = ref([]);
    const checkpointError = ref("");
    async function loadCheckpoints() {
      try {
        const r = await apiRequest("/api/queues/crawl/checkpoints");
        checkpoints.value = r.items || [];
        checkpointError.value = r.error || "";
      }
      catch (e) {
        checkpoints.value = [];
        checkpointError.value = e.message || String(e);
      }
    }
    async function resumeCheckpoint(row) {
      try {
        const params = new URLSearchParams({
          source_platform: row.source_platform || "",
          category_key: row.category_key || "default",
        });
        const res = await apiRequest(`/api/queues/crawl/checkpoints/resume?${params}`, { method: "POST" });
        ElMessage.success(res.warning || `已触发继续采集：${res.task_id}`);
        await loadCheckpoints();
      } catch (err) {
        ElMessage.error(err.message || "继续采集失败");
      }
    }
    onMounted(() => { loadProfiles(); refresh(); loadAuto(); loadCheckpoints(); });
    return { loading, error, stats, tasks, total, filters, refresh, action, formatTime, textOf, onQueueFilterChange, onQueuePageChange, concurrency, autoConfig, profiles, selectedProfile, processQueue, processSelected, saveAuto, retrySelected, retryFiltered, pausePendingRunning, resumePaused, selectionChange, selectedIds, aiErrorMsg, modelText, checkpoints, checkpointError, loadCheckpoints, resumeCheckpoint, PLATFORM_LABELS };
  },

const CrawlQueuePage = {
  components: { ErrorBox, StatusTag },
  setup() {
    const { loading, error, load } = usePageLoader();
    const stats = ref({});
    const tasks = ref([]);
    const total = ref(0);
    const selectedIds = ref([]);
    const errorStats = ref([]);
    const filters = reactive({ page: 1, size: 20, status: "", batch_id: "" });
    const retrying = ref(false);

    async function refresh() {
      await load(async () => {
        const params = new URLSearchParams(filters);
        const esParams = new URLSearchParams(filters.batch_id ? { batch_id: filters.batch_id } : {});
        const [s, t, es] = await Promise.all([
          apiRequest("/api/queues/crawl"),
          apiRequest(`/api/queues/crawl/tasks?${params}`),
          apiRequest(`/api/queues/crawl/error-stats?${esParams}`),
        ]);
        stats.value = s || {};
        tasks.value = t.items || [];
        total.value = t.total || 0;
        errorStats.value = es.items || [];
      });
    }

    function onFilterChange() { filters.page = 1; refresh(); }
    function onPageChange(pn) { filters.page = pn; refresh(); }

    function formatErrorMsg(msg) {
      if (!msg || msg === "-") return "-";
      const s = String(msg);
      if (s.includes("521") || s.includes("WAF") || s.includes("__jsl_clearance") || s.includes("knownsec"))
        return { icon: "🛡️", text: "网站WAF拦截，需启用浏览器渲染模式重试" };
      if (s.includes("Timeout") || s.includes("timed out") || s.includes("timeout"))
        return { icon: "⏱️", text: "请求超时，网络不稳定或目标站响应慢" };
      if (s.includes("ConnectionError") || s.includes("connection refused") || s.includes("reset"))
        return { icon: "🔌", text: "网络连接失败，目标站不可达" };
      if (s.includes("404") || s.includes("Not Found"))
        return { icon: "📄", text: "页面不存在(404)，链接已失效" };
      if (s.includes("JSONDecode") || s.includes("Expecting value") || s.includes("parse"))
        return { icon: "🔧", text: "接口返回格式异常，预期JSON但收到HTML" };
      if (s.includes("403") || s.includes("Forbidden"))
        return { icon: "🚫", text: "访问被拒绝(403)，IP可能被封" };
      if (s.includes("502") || s.includes("503") || s.includes("Bad Gateway"))
        return { icon: "💔", text: "目标站服务暂时不可用(502/503)" };
      if (s.includes("NoSuchElement") || s.includes("Element not found"))
        return { icon: "🧩", text: "页面结构变化，特定元素未找到" };
      return { icon: "⚠️", text: s.slice(0, 100) };
    }

    function changedTip(row) {
      if (!row.changed_fields_json) return [];
      try {
        const arr = JSON.parse(row.changed_fields_json);
        if (Array.isArray(arr) && arr.length > 0 && arr[0].field) return arr;
        return arr.map((x) => ({ field: typeof x === "string" ? x : x.field, old: x.old, new: x.new }));
      } catch (e) { return []; }
    }

    async function retryFailed() {
      retrying.value = true;
      try {
        const params = new URLSearchParams({ status: "failed" });
        if (filters.batch_id) params.set("batch_id", filters.batch_id);
        const r = await apiRequest(`/api/queues/crawl/retry?${params}`, { method: "POST" });
        ElMessage.success(`已重置 ${r.updated} 条失败任务为待采集`);
        refresh();
      } catch (e) {
        ElMessage.error("重试失败: " + e);
      }
      retrying.value = false;
    }

    async function retrySelected() {
      if (!selectedIds.value.length) { ElMessage.warning("请先选择要重试的任务"); return; }
      retrying.value = true;
      try {
        let count = 0;
        for (const id of selectedIds.value) {
          const r = await apiRequest(`/api/queues/crawl/retry?item_id=${id}`, { method: "POST" });
          count += r.updated || 0;
        }
        ElMessage.success(`已重置 ${count} 条选中任务为待采集`);
        selectedIds.value = [];
        refresh();
      } catch (e) {
        ElMessage.error("重试失败: " + e);
      }
      retrying.value = false;
    }

    function selectionChange(sel) { selectedIds.value = sel.map((r) => r.queue_id); }

    onMounted(() => { refresh(); });
    return {
      loading, error, stats, tasks, total, filters, refresh, formatTime,
      formatErrorMsg, changedTip, onFilterChange, onPageChange,
      retryFailed, retrySelected, retrying, selectionChange, errorStats, selectedIds,
    };
  },
  template: `
    <section>
      <div class="page-title"><div><h1>采集队列</h1><p>按批次查看标级采集结果。选中失败任务后可重试，错误原因已自动分类。</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <el-button @click="refresh" :loading="loading" size="default">刷新</el-button>
          <el-button @click="retryFailed" :loading="retrying" type="warning" :disabled="!stats.failed" size="default">重试全部失败 ({{ stats.failed || 0 }})</el-button>
          <el-button @click="retrySelected" :loading="retrying" type="warning" :disabled="!selectedIds.length" plain size="default">重试选中项 ({{ selectedIds.length }})</el-button>
        </div>
      </div>
      <ErrorBox :message="error" />
      <div class="metrics">
        <div class="metric"><div class="label">成功(新增)</div><div class="value">{{ stats.success || 0 }}</div></div>
        <div class="metric"><div class="label">等待AI</div><div class="value">{{ stats.pending_ai || 0 }}</div></div>
        <div class="metric"><div class="label">更新(重复变化)</div><div class="value">{{ stats.updated || 0 }}</div></div>
        <div class="metric"><div class="label">未变化</div><div class="value">{{ stats.unchanged || 0 }}</div></div>
        <div class="metric" style="cursor:pointer" @click="filters.status='failed';onFilterChange()"><div class="label">失败</div><div class="value" :style="{color: stats.failed > 0 ? '#e74c3c' : ''}">{{ stats.failed || 0 }}</div></div>
        <div class="metric"><div class="label">合计</div><div class="value">{{ stats.total || 0 }}</div></div>
      </div>
      <div v-if="errorStats.length > 0" class="metrics" style="margin-top:6px;font-size:13px">
        <div class="metric" v-for="es in errorStats.slice(0,5)" :key="es.last_error" style="padding:6px 10px">
          <div class="label">{{ formatErrorMsg(es.last_error).icon }} {{ formatErrorMsg(es.last_error).text.slice(0,30) }}</div>
          <div class="value">{{ es.cnt }}</div>
        </div>
      </div>
      <div class="filters">
        <el-input v-model="filters.batch_id" placeholder="按批次ID筛选" clearable style="width:240px" @change="onFilterChange" />
        <el-select v-model="filters.status" placeholder="采集状态" clearable @change="onFilterChange">
          <el-option label="待采集" value="pending" />
          <el-option label="等待AI" value="pending_ai" />
          <el-option label="采集中" value="running" />
          <el-option label="成功" value="success" />
          <el-option label="失败" value="failed" />
          <el-option label="已更新" value="updated" />
          <el-option label="无变化" value="unchanged" />
          <el-option label="跳过" value="skipped" />
        </el-select>
      </div>
      <div class="panel">
        <el-table :data="tasks" v-loading="loading" empty-text="暂无采集队列数据" @selection-change="selectionChange">
          <el-table-column type="selection" width="40" />
          <el-table-column prop="queue_id" label="ID" width="70" />
          <el-table-column prop="source_platform" label="平台" width="90" />
          <el-table-column prop="project_name" label="项目" min-width="200" show-overflow-tooltip />
          <el-table-column prop="asset_group_label" label="类型" width="100" />
          <el-table-column label="状态" width="100"><template #default="{row}"><StatusTag :value="row.status" /></template></el-table-column>
          <el-table-column prop="batch_id" label="批次" width="160" show-overflow-tooltip />
          <el-table-column label="变化字段" min-width="200" show-overflow-tooltip>
            <template #default="{row}">
              <template v-if="changedTip(row).length > 0">
                <el-tag v-for="c in changedTip(row).slice(0,3)" :key="c.field" size="small" style="margin:1px">
                  {{ c.field }}<template v-if="c.old !== undefined">: {{ c.old }} → {{ c.new }}</template>
                </el-tag>
                <span v-if="changedTip(row).length > 3" class="muted"> +{{ changedTip(row).length - 3 }}</span>
              </template>
              <span v-else class="muted">-</span>
            </template>
          </el-table-column>
          <el-table-column label="错误原因" min-width="220" show-overflow-tooltip>
            <template #default="{row}">
              <span v-if="row.status === 'failed' && row.error_message">
                <span>{{ formatErrorMsg(row.error_message).icon }}</span>
                <span>{{ formatErrorMsg(row.error_message).text }}</span>
              </span>
              <span v-else class="muted">-</span>
            </template>
          </el-table-column>
          <el-table-column label="操作" width="100" fixed="right">
            <template #default="{row}">
              <el-button v-if="row.status === 'failed'" size="small" type="warning" plain @click="filters.status='failed';filters.batch_id=row.batch_id;onFilterChange()">重试</el-button>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" label="入队时间" width="160"><template #default="{row}">{{ formatTime(row.created_at) }}</template></el-table-column>
        </el-table>
        <div class="panel-body"><el-pagination layout="prev, pager, next, total" :total="total" :page-size="filters.size" v-model:current-page="filters.page" @current-change="onPageChange" /></div>
      </div>
    </section>
  `
};

const ModelConfigPage = {
  components: { ErrorBox },
  setup() {
    const { loading, error, load } = usePageLoader();
    const profiles = ref([]);
    const providers = ref([]);
    const dialogVisible = ref(false);
    const saving = ref(false);
    const isEdit = ref(false);
    const testResult = ref(null);
    const testing = ref(false);
    const taskTypeOptions = [
      { label: "常规文本", value: "text" },
      { label: "长公告", value: "long_text" },
      { label: "债权", value: "debt" },
      { label: "视觉 OCR", value: "vision" },
      { label: "附件解析", value: "attachment" },
    ];

    const form = reactive({
      profile_name: "", provider: "deepseek", model_name: "",
      vision_model_name: "", base_url: "", api_key_value: "",
      timeout_seconds: 0, max_retries: 0, qps: 10,
      max_concurrency: null, task_types: [], priority: 100,
      enabled: 1, is_default: 0, note: ""
    });

    const formRules = {
      profile_name: [{ required: true, message: "请输入配置名称", trigger: "blur" }],
      provider: [{ required: true, message: "请选择供应商", trigger: "change" }]
    };

    const formRef = ref(null);

    async function refresh() {
      await load(async () => {
        const [p, provs] = await Promise.all([
          apiRequest("/api/models/profiles"),
          apiRequest("/api/models/providers")
        ]);
        profiles.value = p;
        providers.value = provs;
      });
    }

    function resetForm() {
      Object.assign(form, {
        profile_name: "", provider: "deepseek", model_name: "",
        vision_model_name: "", base_url: "", api_key_value: "",
        timeout_seconds: 0, max_retries: 0, qps: 10,
        max_concurrency: null, task_types: [], priority: 100,
        enabled: 1, is_default: 0, note: ""
      });
      testResult.value = null;
    }

    function openCreate() {
      resetForm();
      isEdit.value = false;
      dialogVisible.value = true;
    }

    function openEdit(row) {
      resetForm();
      Object.assign(form, {
        profile_name: row.profile_name,
        provider: row.provider || "",
        model_name: row.model_name || "",
        vision_model_name: row.vision_model_name || "",
        base_url: row.base_url || "",
        api_key_value: "",
        timeout_seconds: row.timeout_seconds || 0,
        max_retries: row.max_retries || 0,
        qps: row.qps || 10,
        max_concurrency: row.max_concurrency ?? null,
        task_types: Array.isArray(row.task_types) ? row.task_types : [],
        priority: row.priority ?? 100,
        enabled: row.enabled ?? 1,
        is_default: row.is_default ?? 0,
        note: row.note || ""
      });
      isEdit.value = true;
      dialogVisible.value = true;
    }

    async function submitForm() {
      try {
        await formRef.value.validate();
      } catch { return; }
      saving.value = true;
      try {
        const url = isEdit.value
          ? `/api/models/profiles/${encodeURIComponent(form.profile_name)}`
          : "/api/models/profiles";
        const method = isEdit.value ? "PUT" : "POST";
        const body = { ...form };
        if (isEdit.value) delete body.profile_name;
        if (!body.api_key_value) delete body.api_key_value;
        await apiRequest(url, { method, body: JSON.stringify(body) });
        dialogVisible.value = false;
        ElMessage.success(isEdit.value ? "修改成功" : "创建成功");
        refresh();
      } catch (err) {
        ElMessage.error(err.message || String(err));
      } finally {
        saving.value = false;
      }
    }

    async function deleteProfile(row) {
      try {
        await ElMessageBox.confirm(`确定删除配置 "${row.profile_name}"？`, "删除确认", { type: "warning" });
      } catch { return; }
      await load(async () => {
        await apiRequest(`/api/models/profiles/${encodeURIComponent(row.profile_name)}`, { method: "DELETE" });
        ElMessage.success("已删除");
        refresh();
      });
    }

    async function activate(row) {
      await load(async () => {
        await apiRequest(`/api/models/profiles/${encodeURIComponent(row.profile_name)}/activate`, { method: "POST" });
        ElMessage.success(`已激活 ${row.profile_name}`);
        refresh();
      });
    }

    async function testConnection() {
      // 编辑模式下 api_key_value 可能为空（留空不修改），允许仅测试已有配置
      if (!form.provider || !form.model_name) {
        ElMessage.warning("请填写 Provider 和模型名称");
        return;
      }
      if (!isEdit.value && !form.api_key_value) {
        ElMessage.warning("新建时请填写 API Key");
        return;
      }
      testing.value = true;
      testResult.value = { ok: null, message: "正在测试连接..." };
      try {
        const payload = {
          provider: form.provider,
          model_name: form.model_name,
          api_key: form.api_key_value,
          base_url: form.base_url || "",
          profile_name: form.profile_name || ""
        };
        console.log("[testConnection] payload:", { ...payload, api_key: "***" });
        const result = await apiRequest("/api/models/test-connection", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        console.log("[testConnection] result:", result);
        testResult.value = { ok: !!result.ok, message: result.message || "测试完成", sample: result.sample || null };
      } catch (err) {
        console.error("[testConnection] error:", err);
        const msg = (err && err.message) ? err.message : String(err);
        testResult.value = { ok: false, message: "请求异常: " + msg };
      } finally {
        testing.value = false;
      }
    }

    onMounted(refresh);
    return { loading, error, profiles, providers, dialogVisible, saving, isEdit,
             form, formRules, formRef, testResult, testing, taskTypeOptions,
             refresh, openCreate, openEdit, submitForm, deleteProfile, activate,
             testConnection, formatTime
           };
  },
  template: `
    <section>
      <div class="page-title">
        <div><h1>模型配置管理</h1><p>管理 AI 大模型接入配置：创建、编辑、测试和激活模型 profile。</p></div>
        <div style="display:flex;gap:8px">

                <el-input-number v-model="form.max_concurrency" :min="1" :step="1" placeholder="不限" style="width:100%" />
              </el-form-item>
            </el-col>
            <el-col :span="8">
              <el-form-item label="优先级" label-width="90px">
                <el-input-number v-model="form.priority" :min="1" :step="10" style="width:100%" />
              </el-form-item>
            </el-col>
          </el-row>
          <el-form-item label="适用任务">
            <el-checkbox-group v-model="form.task_types">
              <el-checkbox v-for="item in taskTypeOptions" :key="item.value" :label="item.value">{{ item.label }}</el-checkbox>
            </el-checkbox-group>
            <div class="muted" style="font-size:12px;margin-top:4px">不勾选表示通用；视觉模型可通过提高并发上限同时处理多条 OCR/图片任务。</div>
          </el-form-item>
          <el-row :gutter="12">
            <el-col :span="8">
              <el-form-item label="启用" label-width="90px">
                <el-switch v-model="form.enabled" :active-value="1" :inactive-value="0" />
              </el-form-item>
            </el-col>
            <el-col :span="8">
              <el-form-item label="设为默认" label-width="90px">
                <el-switch v-model="form.is_default" :active-value="1" :inactive-value="0" />
              </el-form-item>
            </el-col>
          </el-row>
          <el-form-item label="备注">
            <el-input v-model="form.note" placeholder="可选备注说明" />
          </el-form-item>
        </el-form>

        <!-- 测试连接区域放在表单外部 -->
        <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--line)">
          <el-button @click.prevent="testConnection" :loading="testing" type="warning" plain>测试连接</el-button>
          <div v-if="testResult" :style="{marginTop:'10px',padding:'10px 14px',borderRadius:'6px',
                   backgroundColor: testResult.ok === true ? '#f0fdf4' : testResult.ok === false ? '#fef2f2' : '#eff6ff',
                   color: testResult.ok === true ? '#15803d' : testResult.ok === false ? '#b42318' : '#1e40af', fontSize:'13px'}">
            {{ testResult.message }}
            <pre v-if="testResult.sample" style="margin:6px 0 0 0;font-size:12px;white-space:pre-wrap;background:rgba(0,0,0,.04);padding:6px;border-radius:4px">{{ testResult.sample }}</pre>

        </template>

    </section>
  `
};

// ── 模型选择页面（卡片式选择） ──
const ModelSelectionPage = {
  components: { ErrorBox },
  setup() {
    const { loading, error, load } = usePageLoader();
    const profiles = ref([]);
    const activeProfile = ref(null);
    const activating = ref(null);

    async function refresh() {
      await load(async () => {
        const [p, a] = await Promise.all([
          apiRequest("/api/models/profiles"),
          apiRequest("/api/models/active").catch(() => null)
        ]);
        profiles.value = p.filter(r => r.enabled);
        activeProfile.value = a;
      });
    }

    async function activateProfile(profileName) {
      activating.value = profileName;
      try {
        await apiRequest(`/api/models/profiles/${encodeURIComponent(profileName)}/activate`, { method: "POST" });
        ElMessage.success(`已切换为 "${profileName}"`);
        refresh();
      } catch (err) {
        ElMessage.error(err.message || String(err));
      } finally {
        activating.value = null;
      }
    }

    function providerTagType(provider) {
      const map = { deepseek: "success", qwen: "", bailian: "warning", openai: "info" };
      return map[provider] || "";
    }

    onMounted(refresh);
    return { loading, error, profiles, activeProfile, activating, refresh, activateProfile, providerTagType };
  },
  template: `
    <section>
      <div class="page-title">
        <div><h1>模型选择</h1><p>选择一个已启用的 AI 模型配置作为当前上下文使用的模型。</p></div>
        <el-button @click="refresh" :loading="loading">刷新</el-button>
      </div>
      <ErrorBox :message="error" />

      <!-- 当前激活模型 -->
      <div v-if="activeProfile" style="margin-bottom:20px;padding:16px 20px;background:var(--primary-soft);
                  border:1px solid var(--primary);border-radius:8px;display:flex;align-items:center;gap:16px">
        <span style="font-weight:700;color:var(--primary)">当前使用</span>
        <span style="font-size:15px;font-weight:600">{{ activeProfile.profile_name || "builtin" }}</span>
        <el-tag size="small" :type="providerTagType(activeProfile.provider)">{{ activeProfile.provider }}</el-tag>
        <code style="font-size:13px;color:var(--muted)">{{ activeProfile.model_name || "-" }}</code>
        <span style="font-size:12px;color:var(--muted);margin-left:auto">来源: {{ activeProfile.source || "mysql" }}</span>
      </div>

      <div v-if="profiles.length === 0" v-loading="loading" style="text-align:center;padding:40px;color:var(--muted)">
        暂无已启用的模型配置，请先在「模型配置」页面创建并启用 profile。
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:16px">
        <div v-for="row in profiles" :key="row.profile_name"
             style="background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:20px;
                    box-shadow:var(--shadow);transition:box-shadow .2s"
             @mouseenter="$event.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'"
             @mouseleave="$event.currentTarget.style.boxShadow='var(--shadow)'">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <span style="font-size:16px;font-weight:700">{{ row.profile_name }}</span>
            <el-tag size="small" :type="providerTagType(row.provider)">{{ row.provider }}</el-tag>
          </div>

          <div style="margin-bottom:10px">
            <div style="color:var(--muted);font-size:12px;margin-bottom:2px">文本模型</div>
            <code style="font-size:13px;word-break:break-all">{{ row.model_name || "-" }}</code>
          </div>

          <div v-if="row.vision_model_name" style="margin-bottom:10px">
            <div style="color:var(--muted);font-size:12px;margin-bottom:2px">视觉模型</div>
            <code style="font-size:13px;word-break:break-all">{{ row.vision_model_name }}</code>
          </div>

          <div style="margin-bottom:10px">
            <div style="color:var(--muted);font-size:12px;margin-bottom:2px">Base URL</div>
            <div style="font-size:12px;color:var(--text);word-break:break-all">{{ row.base_url || "使用默认" }}</div>
          </div>

          <div v-if="row.note" style="margin-bottom:12px;font-size:12px;color:var(--muted);padding:6px 8px;background:var(--surface-soft);border-radius:4px">
            备注: {{ row.note }}
          </div>

          <div style="margin-top:16px">
            <el-button v-if="(activeProfile && activeProfile.profile_name === row.profile_name) || row.is_default"
                       type="success" disabled style="width:100%">
              已激活
            </el-button>
            <el-button v-else type="primary" style="width:100%"
                       :loading="activating === row.profile_name"
                       @click="activateProfile(row.profile_name)">
              激活此模型
            </el-button>
          </div>
        </div>
      </div>
    </section>
  `
};

const ReportsPage = {
  components: { ErrorBox },
  setup() {
    const { loading, error, load } = usePageLoader();
    const rows = ref([]);
    const total = ref(0);
    const detail = ref(null);
    const filters = reactive({ page: 1, size: 20 });
    async function refresh() {
      await load(async () => {
        const params = new URLSearchParams(filters);
        const res = await apiRequest(`/api/reports?${params}`);
        rows.value = res.items || [];
        total.value = res.total || 0;
      });
    }
    function onReportPageChange(pn) { filters.page = pn; refresh(); }
    async function openDetail(row) {
      detail.value = await apiRequest(`/api/reports/${row.report_id}`);
    }
    onMounted(refresh);
    return { loading, error, rows, total, detail, filters, refresh, openDetail, formatTime, textOf, onReportPageChange };
  },
  template: `
    <section>
      <div class="page-title"><div><h1>质量报告</h1><p>查看每次采集后的字段覆盖率、缺失和异常样本。</p></div><el-button @click="refresh" :loading="loading">刷新</el-button></div>
      <ErrorBox :message="error" />
      <div class="panel">
        <el-table :data="rows" v-loading="loading" empty-text="暂无质量报告">
          <el-table-column prop="report_id" label="ID" width="80" />
          <el-table-column prop="batch_id" label="批次" min-width="180" show-overflow-tooltip />
          <el-table-column prop="source_platform" label="平台" width="120" />
          <el-table-column prop="quality_score" label="质量分" width="100" />
          <el-table-column prop="item_count" label="标的数" width="100" />
          <el-table-column prop="missing_fields_count" label="缺失字段" width="110" />
          <el-table-column prop="created_at" label="生成时间" width="170"><template #default="{row}">{{ formatTime(row.created_at) }}</template></el-table-column>
          <el-table-column label="操作" width="100" fixed="right"><template #default="{row}"><el-button size="small" @click="openDetail(row)">查看</el-button></template></el-table-column>
        </el-table>
        <div class="panel-body"><el-pagination layout="prev, pager, next, total" :total="total" :page-size="filters.size" v-model:current-page="filters.page" @current-change="onReportPageChange" /></div>
      </div>
      <el-dialog :model-value="!!detail" title="报告详情" width="860px" @close="detail=null" @closed="detail=null">
        <pre class="pre">{{ JSON.stringify(detail || {}, null, 2) }}</pre>
      </el-dialog>
    </section>
  `
};

const routes = [
  { path: "/", redirect: "/dashboard" },
  { path: "/dashboard", component: DashboardPage },
  { path: "/jobs", component: JobsPage },
  { path: "/batches", component: BatchesPage },
  { path: "/items", component: ItemsPage },
  { path: "/items/:id", component: ItemDetailPage },
  { path: "/queues", component: QueuesPage },
  { path: "/crawl-queue", component: CrawlQueuePage },
  { path: "/platforms", component: PlatformsPage },
  { path: "/reports", component: ReportsPage },
  { path: "/models/config", component: ModelConfigPage },
  { path: "/models/select", component: ModelSelectionPage }
];

const router = createRouter({
  history: createWebHashHistory(),
  routes
});

const App = {
  setup() {
    const auth = reactive({ loading: true, enabled: false, authenticated: true, username: "" });
    const loginForm = reactive({ username: "admin", password: "" });
    const loginError = ref("");
    const loginLoading = ref(false);
    const scheduler = ref({});
    const runningTasks = ref(0);
    let timer = null;
    async function refreshAuth() {
      auth.loading = true;
      try {
        const res = await apiRequest("/api/auth/status");
        auth.enabled = !!res.enabled;
        auth.authenticated = !!res.authenticated;
        auth.username = res.username || "";
      } catch (_err) {
        auth.enabled = false;
        auth.authenticated = true;
      } finally {
        auth.loading = false;
      }
    }
    async function refreshHeader() {
      try {
        const [sch, tasks] = await Promise.all([apiRequest("/api/scheduler/status"), apiRequest("/api/tasks?include_finished=false")]);
        scheduler.value = sch || {};
        runningTasks.value = (tasks.items || []).length;
      } catch (err) {
        scheduler.value = { running: false };
      }
    }
    function startHeaderTimer() {
      if (timer) return;
      refreshHeader();
      timer = setInterval(refreshHeader, 15000);
    }
    async function submitLogin() {
      loginLoading.value = true;
      loginError.value = "";
      try {
        const res = await apiRequest("/api/auth/login", {
          method: "POST",
          body: JSON.stringify(loginForm)
        });
        auth.enabled = !!res.enabled;
        auth.authenticated = !!res.authenticated;
        auth.username = res.username || loginForm.username;
        loginForm.password = "";
        startHeaderTimer();
      } catch (err) {
        loginError.value = err.message || String(err);
      } finally {
        loginLoading.value = false;
      }
    }
    async function logout() {
      await apiRequest("/api/auth/logout", { method: "POST" }).catch(() => null);
      auth.authenticated = false;
      auth.username = "";
      scheduler.value = {};
      runningTasks.value = 0;
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }
    onMounted(async () => {
      await refreshAuth();
      if (!auth.enabled || auth.authenticated) startHeaderTimer();
    });
    onUnmounted(() => timer && clearInterval(timer));
    return { auth, loginForm, loginError, loginLoading, scheduler, runningTasks, submitLogin, logout };
  },
  template: `
    <div v-if="auth.loading" class="login-screen">
      <div class="login-shell">
        <div class="login-visual">
          <div>
            <span class="login-badge">Admin Console</span>
            <h1>拍卖数据采集管理平台</h1>
            <p>正在检查登录状态和后台服务连接。</p>
          </div>
          <div class="login-metrics">
            <div class="login-metric"><strong>MySQL</strong><span>结构化存储</span></div>
            <div class="login-metric"><strong>AI</strong><span>异步补提取</span></div>
            <div class="login-metric"><strong>多平台</strong><span>统一调度</span></div>
          </div>
        </div>
        <div class="login-card">
          <h2>状态检查</h2>
          <p>请稍候。</p>
        </div>
      </div>
    </div>
    <div v-else-if="auth.enabled && !auth.authenticated" class="login-screen">
      <div class="login-shell">
        <div class="login-visual">
          <div>
            <span class="login-badge">Protected Access</span>
            <h1>拍卖数据采集管理平台</h1>
            <p>统一管理多平台采集、批次状态、AI 队列、质量报告和模型配置。开放到局域网或公网前请保持认证开启。</p>
          </div>
          <div class="login-metrics">
            <div class="login-metric"><strong>7+</strong><span>采集平台</span></div>
            <div class="login-metric"><strong>V2</strong><span>MySQL 架构</span></div>
            <div class="login-metric"><strong>断点</strong><span>可恢复采集</span></div>
          </div>
        </div>
        <div class="login-card">
          <h2>管理员登录</h2>
          <p>输入管理员账号后进入后台。</p>
          <el-form @submit.prevent="submitLogin" label-position="top">
            <el-form-item label="用户名">
              <el-input v-model="loginForm.username" autocomplete="username" size="large" />
            </el-form-item>
            <el-form-item label="密码">
              <el-input v-model="loginForm.password" type="password" show-password autocomplete="current-password" size="large" @keyup.enter="submitLogin" />
            </el-form-item>
            <div v-if="loginError" class="error-box">{{ loginError }}</div>
            <el-button type="primary" size="large" style="width:100%" :loading="loginLoading" @click="submitLogin">登录</el-button>
          </el-form>
          <div class="login-footnote">当前会话使用 HttpOnly Cookie 保存。公网部署时请启用 HTTPS 并设置安全密码。</div>
        </div>
      </div>
    </div>
    <div v-else class="shell">
      <header class="topbar">
        <div class="brand">拍卖数据采集管理平台</div>
        <div class="top-actions">
          <span class="top-pill"><span class="status-dot" :class="{ok: scheduler.running, bad: scheduler.running === false}"></span>调度器 {{ scheduler.running ? "运行中" : "未运行" }}</span>
          <span class="top-pill">后台任务 {{ runningTasks }}</span>
          <span class="top-pill">MySQL auction_data</span>
          <el-button v-if="auth.enabled" size="small" @click="logout">退出</el-button>
        </div>
      </header>
      <div class="layout">
        <nav class="sidebar">
          <router-link class="nav-item" to="/dashboard">运营总览</router-link>
          <router-link class="nav-item" to="/jobs">任务管理</router-link>
          <router-link class="nav-item" to="/batches">批次管理</router-link>
          <router-link class="nav-item" to="/items">标的查看</router-link>
          <router-link class="nav-item" to="/queues">队列管理</router-link>
          <router-link class="nav-item" to="/crawl-queue">采集队列</router-link>
          <router-link class="nav-item" to="/platforms">平台管理</router-link>
          <router-link class="nav-item" to="/reports">质量报告</router-link>
          <div style="padding:12px 12px 4px;color:var(--muted);font-size:12px;letter-spacing:1px">模型管理</div>
          <router-link class="nav-item" to="/models/config">模型配置</router-link>
          <router-link class="nav-item" to="/models/select">模型选择</router-link>
        </nav>
        <main class="content">
          <router-view></router-view>
        </main>
      </div>
    </div>
  `
};

const app = createApp(App);
app.use(ElementPlus);
app.use(router);
app.config.globalProperties.PLATFORM_LABELS = PLATFORM_LABELS;
app.config.globalProperties.STATUS_TYPE = STATUS_TYPE;
app.config.globalProperties.router = router;
app.mount("#app");
</script>
